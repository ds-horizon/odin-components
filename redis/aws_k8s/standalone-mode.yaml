---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ componentMetadata.envName }}
---
{% if baseConfig.username and baseConfig.password %}
# Create Secret for Redis ACL authentication
apiVersion: v1
kind: Secret
metadata:
  name: redis-acl
  namespace: {{ componentMetadata.envName }}
type: Opaque
stringData:
  user.acl: |
    user {{ baseConfig.username }} on >{{ baseConfig.password }} ~* &* +@all
    user default on nopass ~* &* +@all
---
# Password secret for redis-exporter
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: {{ componentMetadata.envName }}
type: Opaque
stringData:
  username: "{{ baseConfig.username }}"
  password: "{{ baseConfig.password }}"
---
{% endif %}
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: ${RELEASE_NAME}-standalone
  namespace: {{ componentMetadata.envName }}
spec:
  # ACL authentication (if username/password provided)
  {% if baseConfig.username and baseConfig.password %}
  acl:
    secret:
      secretName: redis-acl
  {% endif %}
  
  # Redis version
  kubernetesConfig:
    image: quay.io/opstree/redis:v{{ baseConfig.version }}.12
    imagePullPolicy: {{ flavourConfig.imagePullPolicy | default('IfNotPresent') }}
    
    # Resource requirements
    resources:
      requests:
        cpu: {{ flavourConfig.resources.requests.cpu }}
        memory: {{ flavourConfig.resources.requests.memory }}
      limits:
        cpu: {{ flavourConfig.resources.limits.cpu }}
        memory: {{ flavourConfig.resources.limits.memory }}
  
  # Storage configuration
  {% if flavourConfig.storage.enabled %}
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ flavourConfig.storage.storageClassName }}
        resources:
          requests:
            storage: {{ flavourConfig.storage.storageSize }}
  {% endif %}
  
  # Pod security context
  podSecurityContext:
    fsGroup: {{ flavourConfig.securityContext.fsGroup | default(1000) }}
    runAsUser: {{ flavourConfig.securityContext.runAsUser | default(1000) }}
    runAsNonRoot: {{ flavourConfig.securityContext.runAsNonRoot | default(true) }}
  
  # Redis exporter for Prometheus metrics
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    env:
      - name: REDIS_EXPORTER_LOG_FORMAT
        value: "json"
      - name: REDIS_USER
        valueFrom:
          secretKeyRef:
            name: redis-secret
            key: username
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: redis-secret
            key: password
  
  # Redis configuration
  # NOTE: additionalRedisConfig has a bug in Opstree Redis Operator where it creates
  # malformed ConfigMap references. Removed to deploy with vanilla Redis defaults.
  # Redis will use default settings which work well for most use cases.
  # {% if flavourConfig.redisConfig or flavourConfig.persistence %}
  # redisConfig:
  #   additionalRedisConfig: |
  #     {% if flavourConfig.persistence.enabled %}
  #     # RDB Persistence
  #     save 900 1
  #     save 300 10
  #     save 60 10000
  #     # AOF Persistence
  #     appendonly yes
  #     appendfsync {{ flavourConfig.persistence.aofFsyncPolicy | default('everysec') }}
  #     dir /data
  #     {% endif %}
  #     # Memory Configuration
  #     maxmemory {{ flavourConfig.redisConfig.maxmemory | default('1gb') }}
  #     maxmemory-policy {{ flavourConfig.redisConfig.maxmemoryPolicy | default('allkeys-lru') }}
  #     {% if flavourConfig.redisConfig.additionalConfig %}
  #     # Additional Configuration
  #     {% for key, value in flavourConfig.redisConfig.additionalConfig.items() %}
  #     {{ key }} {{ value }}
  #     {% endfor %}
  #     {% endif %}
  # {% endif %}
  
  # Node selector (if specified)
  {% if flavourConfig.nodeSelector %}
  nodeSelector:
    {% for key, value in flavourConfig.nodeSelector.items() %}
    {{ key }}: {{ value }}
    {% endfor %}
  {% endif %}
  
  # Tolerations (if specified)
  {% if flavourConfig.tolerations and flavourConfig.tolerations|length > 0 %}
  tolerations:
    {{ flavourConfig.tolerations | to_yaml | indent(4) }}
  {% endif %}
  
  # Priority class (if specified)
  {% if flavourConfig.priorityClassName %}
  priorityClassName: {{ flavourConfig.priorityClassName }}
  {% endif %}
  
  # Service account (if specified)
  {% if flavourConfig.serviceAccount %}
  serviceAccountName: {{ flavourConfig.serviceAccount }}
  {% endif %}
